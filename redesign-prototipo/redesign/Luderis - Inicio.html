<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Luderis — Inicio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;450;500;600;650;700;750;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Hanken Grotesk', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    background: #F4F7FB;
  }
  #root { min-height: 100vh; }
  button { font-family: inherit; }
  /* Las transiciones nunca animan background/color: evita "flash" al cambiar de tema
     y deja el hover (transform/sombra/borde) suave. */
  *, *::before, *::after { transition-property: transform, box-shadow, border-color, outline-color, opacity !important; }
  input, textarea { font-family: inherit; }
  ::selection { background: rgba(26,110,216,.18); }
  .ld-scroll::-webkit-scrollbar { height: 0; width: 0; }
  .ld-filter-drawer { animation: ldSlide .22s cubic-bezier(.2,.7,.3,1); }
  @keyframes ldSlide { from { transform: translateX(100%); } to { transform: translateX(0); } }
  @keyframes ldFade { from { opacity: 0; } to { opacity: 1; } }
  @media (max-width: 560px) { .ld-hide-mobile { display: none; } }
  @media (max-width: 760px) {
    .ld-agenda-grid { grid-template-columns: 1fr !important; }
    .ld-juegos-grid { grid-template-columns: 1fr !important; }
    .ld-cuenta-grid { grid-template-columns: 1fr !important; }
    .ld-legal-grid { grid-template-columns: 1fr !important; }
    .ld-legal-toc { display: none !important; }
  }
  :focus-visible { outline: 2px solid #1A6ED8; outline-offset: 2px; border-radius: 4px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
