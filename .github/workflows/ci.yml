name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint a11y (gate)
        # Falla solo si reaparecen warnings de accesibilidad (red de seguridad a11y).
        # No bloquea por otros warnings preexistentes (no-unused-vars, etc.).
        run: |
          A11Y=$(npx eslint src --ext .js,.jsx -f compact | grep -c "jsx-a11y" || true)
          echo "Warnings jsx-a11y: $A11Y"
          test "$A11Y" -eq 0

      - name: Test
        run: npm run test:ci

      - name: Build
        env:
          CI: "false" # los warnings no rompen el build de producción
          REACT_APP_SUPABASE_URL: ${{ secrets.REACT_APP_SUPABASE_URL }}
          REACT_APP_SUPABASE_KEY: ${{ secrets.REACT_APP_SUPABASE_KEY }}
        run: npm run build
